name: Build & Package

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE=$(ls /Applications | grep -E '^Xcode_26' | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
            echo "Selected: $XCODE"
          else
            echo "Xcode 26 not found, using default: $(xcode-select -p)"
          fi
          swift --version

      - name: Build
        run: swift build -c release --arch arm64 -Xswiftc -suppress-warnings

      - name: Verify binary
        run: |
          ls -lh .build/arm64-apple-macosx/release/Clipy
          find .build/arm64-apple-macosx/release -maxdepth 1 -name "*.bundle" | sort

  package:
    name: Package DMG
    runs-on: macos-15
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE=$(ls /Applications | grep -E '^Xcode_26' | sort -V | tail -1)
          if [ -n "$XCODE" ]; then
            sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
            echo "Selected: $XCODE"
          else
            echo "Xcode 26 not found, using default: $(xcode-select -p)"
          fi
          swift --version

      - name: Build
        run: swift build -c release --arch arm64 -Xswiftc -suppress-warnings

      - name: Assemble .app bundle
        run: |
          set -e
          APP_DIR="dist/Clipy.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp .build/arm64-apple-macosx/release/Clipy "$APP_DIR/Contents/MacOS/Clipy"
          chmod +x "$APP_DIR/Contents/MacOS/Clipy"
          cp Resources/Info.plist "$APP_DIR/Contents/Info.plist"
          cp Resources/Clipy.icns "$APP_DIR/Contents/Resources/Clipy.icns"
          cp Resources/clipy_menubar.png "$APP_DIR/Contents/Resources/clipy_menubar.png"
          cp "Resources/clipy_menubar@2x.png" "$APP_DIR/Contents/Resources/clipy_menubar@2x.png"

          # SPM resource bundles go in Contents/Resources/
          find .build/arm64-apple-macosx/release -maxdepth 1 -name "*.bundle" -exec cp -r {} "$APP_DIR/Contents/Resources/" \;

          ls -lhR "$APP_DIR"

      - name: Ad-hoc sign
        run: |
          codesign \
            --force --deep --sign - \
            --entitlements Resources/Clipy.entitlements \
            --options runtime \
            dist/Clipy.app

          codesign --verify --deep --strict dist/Clipy.app
          echo "Signing OK"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -r dist/Clipy.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications

          hdiutil create \
            -volname "Clipy" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            "dist/Clipy-${{ github.ref_name }}.dmg"

          ls -lh "dist/Clipy-${{ github.ref_name }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clipy-${{ github.ref_name }}
          path: dist/Clipy-${{ github.ref_name }}.dmg
          retention-days: 30

      - name: Delete existing release if present
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clipy ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/Clipy-${{ github.ref_name }}.dmg
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
