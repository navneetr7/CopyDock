name: Build & Package

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: |
          swift build -c release \
            --arch arm64 \
            --arch x86_64 \
            -Xswiftc -suppress-warnings

      - name: Verify binary exists
        run: |
          ls -lh .build/apple/Products/Release/Clipy || \
          ls -lh .build/release/Clipy

  package:
    name: Package DMG
    runs-on: macos-14
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build universal release binary
        run: |
          swift build -c release \
            --arch arm64 \
            --arch x86_64 \
            -Xswiftc -suppress-warnings

      - name: Assemble .app bundle
        run: |
          set -e
          APP_DIR="dist/Clipy.app"
          MACOS_DIR="$APP_DIR/Contents/MacOS"
          RESOURCES_DIR="$APP_DIR/Contents/Resources"

          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          # Copy binary (universal from fat build, or single arch fallback)
          if [ -f ".build/apple/Products/Release/Clipy" ]; then
            cp ".build/apple/Products/Release/Clipy" "$MACOS_DIR/Clipy"
          else
            cp ".build/release/Clipy" "$MACOS_DIR/Clipy"
          fi

          chmod +x "$MACOS_DIR/Clipy"

          # Info.plist is embedded via linkerSettings in Package.swift
          # Copy entitlements
          cp "Resources/Clipy.entitlements" "$RESOURCES_DIR/"

          echo "App bundle assembled at $APP_DIR"
          ls -lhR "$APP_DIR"

      - name: Ad-hoc sign (no Apple Developer account required)
        run: |
          codesign \
            --force \
            --deep \
            --sign - \
            --entitlements "Resources/Clipy.entitlements" \
            --options runtime \
            "dist/Clipy.app"

          codesign --verify --deep --strict "dist/Clipy.app"
          echo "Ad-hoc signing complete"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Clipy" \
            -srcfolder "dist/Clipy.app" \
            -ov \
            -format UDZO \
            "dist/Clipy-${{ github.ref_name }}.dmg"

          ls -lh "dist/Clipy-${{ github.ref_name }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clipy-${{ github.ref_name }}
          path: dist/Clipy-${{ github.ref_name }}.dmg
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clipy ${{ github.ref_name }}
          files: dist/Clipy-${{ github.ref_name }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
