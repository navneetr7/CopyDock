name: Build & Package

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64
        run: swift build -c release --arch arm64 -Xswiftc -suppress-warnings

      - name: Build x86_64
        run: swift build -c release --arch x86_64 -Xswiftc -suppress-warnings

      - name: Verify binaries
        run: |
          ls -lh .build/arm64-apple-macosx/release/Clipy
          ls -lh .build/x86_64-apple-macosx/release/Clipy

  package:
    name: Package DMG
    runs-on: macos-15
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64
        run: swift build -c release --arch arm64 -Xswiftc -suppress-warnings

      - name: Build x86_64
        run: swift build -c release --arch x86_64 -Xswiftc -suppress-warnings

      - name: Create universal binary with lipo
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/Clipy \
            .build/x86_64-apple-macosx/release/Clipy \
            -output .build/Clipy-universal
          file .build/Clipy-universal

      - name: Assemble .app bundle
        run: |
          set -e
          APP_DIR="dist/Clipy.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp .build/Clipy-universal "$APP_DIR/Contents/MacOS/Clipy"
          chmod +x "$APP_DIR/Contents/MacOS/Clipy"
          cp Resources/Clipy.entitlements "$APP_DIR/Contents/Resources/"

          ls -lhR "$APP_DIR"

      - name: Ad-hoc sign
        run: |
          codesign \
            --force --deep --sign - \
            --entitlements Resources/Clipy.entitlements \
            --options runtime \
            dist/Clipy.app

          codesign --verify --deep --strict dist/Clipy.app
          echo "Signing OK"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Clipy" \
            -srcfolder dist/Clipy.app \
            -ov -format UDZO \
            "dist/Clipy-${{ github.ref_name }}.dmg"

          ls -lh "dist/Clipy-${{ github.ref_name }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clipy-${{ github.ref_name }}
          path: dist/Clipy-${{ github.ref_name }}.dmg
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Clipy ${{ github.ref_name }}
          files: dist/Clipy-${{ github.ref_name }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
